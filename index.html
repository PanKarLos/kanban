<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kájův úkolníček</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }

    header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 14px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #f1f5f9; flex: 1; }

    #connection-status { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #64748b; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .header-btn {
      background: #334155; border: none; color: #94a3b8;
      border-radius: 8px; padding: 7px 12px; cursor: pointer;
      font-size: 0.82rem; display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .header-btn:hover { background: #475569; color: #e2e8f0; }
    .header-btn.active { background: #6366f1; color: #fff; }

    #admin-badge {
      display: none; background: #6366f1; color: #fff;
      font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    }

    /* ── MODAL ─────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 28px; width: 360px; max-width: 92vw;
    }
    .modal h2 { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .modal p { font-size: 0.82rem; color: #64748b; margin-bottom: 18px; line-height: 1.5; }
    .modal input {
      width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 8px; padding: 10px 14px; font-size: 0.88rem; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s; font-family: inherit;
    }
    .modal input:focus { border-color: #6366f1; }
    .modal-buttons { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary {
      background: #334155; color: #94a3b8; border: none;
      border-radius: 8px; padding: 10px 14px; font-size: 0.88rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: #475569; color: #e2e8f0; }
    .modal-error { color: #ef4444; font-size: 0.78rem; margin-bottom: 10px; display: none; }

    /* ── BOARD ─────────────────────────────────────────────── */
    .board {
      display: flex; gap: 18px; padding: 22px 24px;
      overflow-x: auto; min-height: calc(100vh - 58px); align-items: flex-start;
    }

    .column {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      width: 320px; min-width: 320px; display: flex; flex-direction: column;
      max-height: calc(100vh - 96px);
    }
    .column-header {
      padding: 14px 16px 11px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid #334155;
    }
    .column-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .col-new .column-dot { background: #6366f1; }
    .col-in-progress .column-dot { background: #f59e0b; }
    .col-done .column-dot { background: #22c55e; }
    .column-title { font-weight: 600; font-size: 0.9rem; color: #cbd5e1; flex: 1; }
    .column-count { background: #334155; color: #94a3b8; font-size: 0.72rem; font-weight: 600; border-radius: 20px; padding: 2px 8px; }

    .col-locked .add-area { display: none; }

    .cards {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 8px; min-height: 60px;
    }
    .cards::-webkit-scrollbar { width: 3px; }
    .cards::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* ── CARD ──────────────────────────────────────────────── */
    .card {
      background: #0f172a; border: 1px solid #2d3a4a;
      border-radius: 10px; padding: 12px; transition: all 0.15s; position: relative;
      cursor: default;
    }
    .admin-mode .card { cursor: grab; }
    .admin-mode .card:active { cursor: grabbing; }
    .card:hover { border-color: #4f46e5; box-shadow: 0 3px 16px rgba(99,102,241,0.12); }
    .card.dragging { opacity: 0.35; }
    .card.drag-over-top { border-top: 2px solid #6366f1; }
    .card.drag-over-bottom { border-bottom: 2px solid #6366f1; }

    /* Priority badge */
    .priority-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; margin-bottom: 7px; letter-spacing: 0.3px;
    }
    .prio-high { background: #ef444422; color: #f87171; border: 1px solid #ef444433; }
    .prio-medium { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b33; }
    .prio-low { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f633; }

    .card-title {
      font-size: 0.875rem; font-weight: 600; color: #e2e8f0;
      line-height: 1.4; padding-right: 22px; margin-bottom: 5px;
    }
    .card-desc {
      font-size: 0.775rem; color: #64748b; line-height: 1.55; margin-bottom: 10px;
      white-space: pre-wrap;
    }

    /* Creator avatar */
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .creator { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .avatar {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: #fff;
      background: #334155; overflow: hidden; border: 1px solid #475569;
    }
    .avatar.monkey { font-size: 14px; background: #1e293b; }
    .creator-name { font-size: 0.72rem; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

    .card-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .card-date { font-size: 0.68rem; color: #3d4f63; white-space: nowrap; }

    .btn-trumpet {
      background: none; border: 1px solid #2d3a4a; color: #64748b;
      border-radius: 6px; padding: 2px 6px; cursor: pointer; font-size: 0.75rem;
      transition: all 0.15s; line-height: 1;
    }
    .btn-trumpet:hover { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }

    .card-delete {
      display: none; background: none; border: none; color: #3d4f63; cursor: pointer;
      padding: 2px 4px; border-radius: 4px; font-size: 0.8rem; line-height: 1;
      transition: color 0.15s; position: absolute; top: 9px; right: 9px;
    }
    .admin-mode .card-delete { display: block; }
    .card-delete:hover { color: #ef4444; }

    .card-move-btns { display: none; gap: 4px; margin-top: 8px; }
    .admin-mode .card-move-btns { display: flex; }
    .move-btn {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      font-size: 0.68rem; border-radius: 6px; padding: 3px 7px; cursor: pointer; transition: all 0.15s;
    }
    .move-btn:hover { background: #334155; color: #e2e8f0; }

    /* ── ADD FORM ──────────────────────────────────────────── */
    .add-area { padding: 10px; border-top: 1px solid #334155; }
    .add-btn {
      width: 100%; background: none; border: 1px dashed #2d3a4a; color: #475569;
      padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .add-btn:hover { border-color: #6366f1; color: #a5b4fc; background: rgba(99,102,241,0.05); }

    .add-form { display: none; flex-direction: column; gap: 7px; }
    .add-form.visible { display: flex; }
    .add-form input, .add-form textarea {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 8px; padding: 8px 11px; font-size: 0.82rem; font-family: inherit;
      resize: none; outline: none; transition: border-color 0.15s;
    }
    .add-form input:focus, .add-form textarea:focus { border-color: #6366f1; }
    .add-form input::placeholder, .add-form textarea::placeholder { color: #3d4f63; }

    /* Priority picker */
    .prio-picker { display: flex; gap: 5px; }
    .prio-opt {
      flex: 1; background: #1e293b; border: 1px solid #334155; color: #64748b;
      border-radius: 7px; padding: 5px 4px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .prio-opt:hover { border-color: #4f46e5; color: #a5b4fc; }
    .prio-opt.selected-high { background: #ef444422; border-color: #ef4444; color: #f87171; }
    .prio-opt.selected-medium { background: #f59e0b22; border-color: #f59e0b; color: #fbbf24; }
    .prio-opt.selected-low { background: #3b82f622; border-color: #3b82f6; color: #60a5fa; }
    .prio-opt.selected-none { background: #33415540; border-color: #475569; color: #94a3b8; }

    .form-row { display: flex; gap: 7px; }
    .form-row input { flex: 1; }

    .form-btns { display: flex; gap: 7px; }
    .btn-save {
      flex: 1; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; padding: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #4f46e5; }
    .btn-cancel {
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      border-radius: 8px; padding: 8px 10px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }

    /* drop zone */
    .drop-indicator {
      height: 3px; border-radius: 2px; background: #6366f1;
      margin: 2px 0; display: none;
    }
    .drop-indicator.visible { display: block; }

    /* Edit button na kartě */
    .btn-edit {
      display: none; background: none; border: none; color: #3d4f63; cursor: pointer;
      padding: 2px 5px; border-radius: 4px; font-size: 0.78rem; line-height: 1;
      transition: color 0.15s; position: absolute; top: 9px; right: 28px;
    }
    .admin-mode .btn-edit { display: block; }
    .btn-edit:hover { color: #6366f1; }

    /* Edit modal extra styles */
    .modal textarea {
      width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 8px; padding: 10px 14px; font-size: 0.88rem; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s; font-family: inherit;
      resize: none;
    }
    .modal textarea:focus { border-color: #6366f1; }
    .modal .prio-picker { display: flex; gap: 5px; margin-bottom: 12px; }
    .modal .prio-opt {
      flex: 1; background: #1e293b; border: 1px solid #334155; color: #64748b;
      border-radius: 7px; padding: 5px 4px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .modal .prio-opt:hover { border-color: #4f46e5; color: #a5b4fc; }
    .modal .prio-opt.selected-high { background: #ef444422; border-color: #ef4444; color: #f87171; }
    .modal .prio-opt.selected-medium { background: #f59e0b22; border-color: #f59e0b; color: #fbbf24; }
    .modal .prio-opt.selected-low { background: #3b82f622; border-color: #3b82f6; color: #60a5fa; }
    .modal .prio-opt.selected-none { background: #33415540; border-color: #475569; color: #94a3b8; }

    /* ── TOAST ─────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 22px; right: 22px;
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      padding: 11px 16px; font-size: 0.83rem; color: #e2e8f0;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      transform: translateY(70px); opacity: 0; transition: all 0.3s; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: #ef444444; }

    @media (max-width: 768px) {
      .board { padding: 12px; flex-direction: column; }
      .column { width: 100%; min-width: unset; max-height: none; }
    }
  </style>
</head>
<body>

<!-- ============================================================
  ⚙️  KONFIGURACE
  ============================================================ -->
<script>
  const SUPABASE_URL = "%%SUPABASE_URL%%";
  const SUPABASE_KEY = "%%SUPABASE_KEY%%";
  const NTFY_TOPIC   = "%%NTFY_TOPIC%%";
  const ADMIN_PASSWORD = "%%ADMIN_PASSWORD%%";
</script>

<!-- Admin login modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h2>🔒 Admin přihlášení</h2>
    <p>Zadej heslo pro správu úkolů.</p>
    <div class="modal-error" id="login-error">Špatné heslo.</div>
    <input type="password" id="admin-pass-input" placeholder="Heslo" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="modal-buttons">
      <button class="btn-primary" onclick="doLogin()">Přihlásit</button>
      <button class="btn-secondary" onclick="closeModal('login-modal')">Zrušit</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>✏️ Upravit úkol</h2>
    <input type="text" id="edit-title" placeholder="Název úkolu *" maxlength="120"/>
    <textarea id="edit-desc" placeholder="Poznámka / popis (volitelné)" rows="3"></textarea>
    <div class="prio-picker" id="edit-prio-picker">
      <button type="button" class="prio-opt" data-prio="high"   onclick="selectEditPrio('high')">🔴 Vysoká</button>
      <button type="button" class="prio-opt" data-prio="medium" onclick="selectEditPrio('medium')">🟡 Střední</button>
      <button type="button" class="prio-opt" data-prio="low"    onclick="selectEditPrio('low')">🔵 Nízká</button>
      <button type="button" class="prio-opt selected-none" data-prio="none" onclick="selectEditPrio('none')">— Žádná</button>
    </div>
    <div class="modal-error" id="edit-error">Název nesmí být prázdný.</div>
    <div class="modal-buttons">
      <button class="btn-primary" onclick="saveEdit()">Uložit</button>
      <button class="btn-secondary" onclick="closeModal('edit-modal')">Zrušit</button>
    </div>
  </div>
</div>

<header>
  <h1>📋 Kájův úkolníček</h1>
  <span id="admin-badge">ADMIN</span>
  <button class="header-btn" onclick="sendPingNotification()">🎺 Ping</button>
  <button class="header-btn" id="admin-btn" onclick="toggleAdmin()">🔒 Admin</button>
  <div id="connection-status">
    <span class="status-dot connecting" id="status-dot"></span>
    <span id="status-text">Připojuji…</span>
  </div>
</header>

<div class="board" id="board">
  <!-- Nové -->
  <div class="column col-new" id="col-new"
    ondragover="onColDragOver(event,'new')" ondrop="onColDrop(event,'new')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Nové</span>
      <span class="column-count" id="count-new">0</span>
    </div>
    <div class="cards" id="cards-new"></div>
    <div class="add-area" id="add-area-new">
      <button class="add-btn" onclick="showForm('new')">＋ Přidat úkol</button>
      <div class="add-form" id="form-new">
        <input type="text" id="title-new" placeholder="Název úkolu *" maxlength="120"/>
        <textarea id="desc-new" placeholder="Poznámka / popis (volitelné)" rows="2"></textarea>
        <div class="prio-picker" id="prio-new">
          <button type="button" class="prio-opt" data-prio="high" onclick="selectPrio('new','high')">🔴 Vysoká</button>
          <button type="button" class="prio-opt" data-prio="medium" onclick="selectPrio('new','medium')">🟡 Střední</button>
          <button type="button" class="prio-opt" data-prio="low" onclick="selectPrio('new','low')">🔵 Nízká</button>
          <button type="button" class="prio-opt selected-none" data-prio="none" onclick="selectPrio('new','none')">— Žádná</button>
        </div>
        <input type="text" id="creator-new" placeholder="Tvoje jméno (volitelné)" maxlength="40"/>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('new')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('new')">Zrušit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Probíhá -->
  <div class="column col-in-progress col-locked" id="col-in-progress"
    ondragover="onColDragOver(event,'in-progress')" ondrop="onColDrop(event,'in-progress')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Probíhá</span>
      <span class="column-count" id="count-in-progress">0</span>
    </div>
    <div class="cards" id="cards-in-progress"></div>
    <div class="add-area" id="add-area-in-progress">
      <button class="add-btn" onclick="showForm('in-progress')">＋ Přidat úkol</button>
      <div class="add-form" id="form-in-progress">
        <input type="text" id="title-in-progress" placeholder="Název úkolu *" maxlength="120"/>
        <textarea id="desc-in-progress" placeholder="Poznámka / popis (volitelné)" rows="2"></textarea>
        <div class="prio-picker" id="prio-in-progress">
          <button type="button" class="prio-opt" data-prio="high" onclick="selectPrio('in-progress','high')">🔴 Vysoká</button>
          <button type="button" class="prio-opt" data-prio="medium" onclick="selectPrio('in-progress','medium')">🟡 Střední</button>
          <button type="button" class="prio-opt" data-prio="low" onclick="selectPrio('in-progress','low')">🔵 Nízká</button>
          <button type="button" class="prio-opt selected-none" data-prio="none" onclick="selectPrio('in-progress','none')">— Žádná</button>
        </div>
        <input type="text" id="creator-in-progress" placeholder="Tvoje jméno (volitelné)" maxlength="40"/>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('in-progress')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('in-progress')">Zrušit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hotovo -->
  <div class="column col-done col-locked" id="col-done"
    ondragover="onColDragOver(event,'done')" ondrop="onColDrop(event,'done')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Hotovo</span>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div class="cards" id="cards-done"></div>
    <div class="add-area" id="add-area-done">
      <button class="add-btn" onclick="showForm('done')">＋ Přidat úkol</button>
      <div class="add-form" id="form-done">
        <input type="text" id="title-done" placeholder="Název úkolu *" maxlength="120"/>
        <textarea id="desc-done" placeholder="Poznámka / popis (volitelné)" rows="2"></textarea>
        <div class="prio-picker" id="prio-done">
          <button type="button" class="prio-opt" data-prio="high" onclick="selectPrio('done','high')">🔴 Vysoká</button>
          <button type="button" class="prio-opt" data-prio="medium" onclick="selectPrio('done','medium')">🟡 Střední</button>
          <button type="button" class="prio-opt" data-prio="low" onclick="selectPrio('done','low')">🔵 Nízká</button>
          <button type="button" class="prio-opt selected-none" data-prio="none" onclick="selectPrio('done','none')">— Žádná</button>
        </div>
        <input type="text" id="creator-done" placeholder="Tvoje jméno (volitelné)" maxlength="40"/>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('done')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('done')">Zrušit</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ============================================================
  SUPABASE
  ============================================================ -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const ok = !SUPABASE_URL.includes('%%') && !SUPABASE_URL.includes('TVŮJ');
  if (!ok) { setStatus('offline','Není nakonfigurováno'); }
  else {

  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadAll() {
    const { data, error } = await sb.from('tasks').select('*').order('position_order', { ascending: true });
    if (error) { setStatus('offline','Chyba připojení'); console.error(error); return; }
    setStatus('connected','Sdílený – live');
    renderAll(data || []);
  }

  sb.channel('tasks-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadAll())
    .subscribe(s => { if (s === 'SUBSCRIBED') setStatus('connected','Sdílený – live'); });

  loadAll();

  window.saveCard = async function(col, title, desc, priority, creator) {
    const { data: existing } = await sb.from('tasks').select('position_order').eq('status', col).order('position_order', { ascending: false }).limit(1);
    const maxPos = existing && existing.length ? existing[0].position_order : 0;
    const { error } = await sb.from('tasks').insert([{
      title, description: desc, status: col,
      priority: priority || 'none',
      creator: creator || '',
      position_order: maxPos + 1000
    }]);
    if (!error) sendNewTaskNotification(title, creator);
  };

  window.deleteCard = async function(id) {
    if (!confirm('Smazat úkol?')) return;
    await sb.from('tasks').delete().eq('id', id);
  };

  window.moveCard = async function(id, newCol) {
    const { data: existing } = await sb.from('tasks').select('position_order').eq('status', newCol).order('position_order', { ascending: false }).limit(1);
    const maxPos = existing && existing.length ? existing[0].position_order : 0;
    await sb.from('tasks').update({ status: newCol, position_order: maxPos + 1000 }).eq('id', id);
  };

  window.reorderCard = async function(id, newPosition) {
    await sb.from('tasks').update({ position_order: newPosition }).eq('id', id);
  };

  window.updateCard = async function(id, title, desc, priority) {
    await sb.from('tasks').update({ title, description: desc, priority }).eq('id', id);
  };

  } // end else (ok)
</script>

<!-- ============================================================
  HLAVNÍ LOGIKA
  ============================================================ -->
<script>
  const COLUMNS = ['new','in-progress','done'];
  const COL_LABELS = { 'new':'Nové', 'in-progress':'Probíhá', 'done':'Hotovo' };
  const PRIO_WEIGHT = { high: 3, medium: 2, low: 1, none: 0 };

  let isAdmin = false;
  let draggedId = null;
  let draggedCol = null;
  let currentTasks = [];

  // ── STATUS ──────────────────────────────────────────────────
  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'connecting' ? ' connecting' : '');
    document.getElementById('status-text').textContent = text;
  }

  // ── TOAST ────────────────────────────────────────────────────
  let _tt;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show ' + type;
    clearTimeout(_tt); _tt = setTimeout(() => { t.className = ''; }, 3200);
  }

  // ── NTFY ─────────────────────────────────────────────────────
  async function sendNtfy(title, message, tags) {
    if (!NTFY_TOPIC || NTFY_TOPIC.includes('%%') || NTFY_TOPIC.includes('TVŮJ')) return;
    try {
      const payload = { topic: NTFY_TOPIC, title, message };
      if (tags) payload.tags = tags.split(',').map(t => t.trim()).filter(Boolean);
      const res = await fetch('https://ntfy.sh/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      console.log('ntfy:', res.status);
    } catch(e) { console.warn('ntfy error', e); }
  }

  function sendNewTaskNotification(title, creator) {
    const who = creator || 'nějaká opice';
    sendNtfy('📋 Nový úkol', `${title} — přidal(a) ${who}`, 'inbox_tray');
    showToast('✅ Úkol přidán');
  }

  function sendPingNotification() {
    sendNtfy('🎺 Ping', 'Někdo ti posílá upozornění z Kanban boardu!', 'loudspeaker,rotating_light');
    showToast('🎺 Ping odeslán!');
  }
  window.sendPingNotification = sendPingNotification;

  function sendCardTrumpet(title, creator) {
    const who = creator || 'někdo';
    sendNtfy('🎺 Upozornění', `Úkol: ${title} (${who})`, 'loudspeaker');
    showToast('🎺 Upozornění odesláno!');
  }

  // ── AVATAR ───────────────────────────────────────────────────
  const AVATAR_COLORS = ['#6366f1','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#ef4444','#22c55e','#3b82f6'];

  function getAvatar(creator) {
    if (!creator || creator.trim() === '') {
      return `<div class="avatar monkey">🐒</div>`;
    }
    const name = creator.trim();
    const words = name.split(/\s+/);
    const initials = words.length >= 2
      ? (words[0][0] + words[words.length-1][0]).toUpperCase()
      : name.slice(0,2).toUpperCase();
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
    const color = AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    return `<div class="avatar" style="background:${color}">${initials}</div>`;
  }

  function getCreatorName(creator) {
    return creator && creator.trim() ? creator.trim() : 'nějaká opice';
  }

  // ── RENDER ───────────────────────────────────────────────────
  function renderAll(tasks) {
    currentTasks = tasks;
    const buckets = { 'new': [], 'in-progress': [], 'done': [] };
    tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });

    COLUMNS.forEach(col => {
      // sort: priority desc, then position_order asc
      buckets[col].sort((a, b) => {
        const pd = (PRIO_WEIGHT[b.priority] || 0) - (PRIO_WEIGHT[a.priority] || 0);
        if (pd !== 0) return pd;
        return (a.position_order || 0) - (b.position_order || 0);
      });

      const container = document.getElementById('cards-' + col);
      container.innerHTML = '';
      buckets[col].forEach(t => container.appendChild(buildCard(t)));
      document.getElementById('count-' + col).textContent = buckets[col].length;
    });
  }

  function buildCard(task) {
    const col = task.status;
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = task.id;
    div.dataset.pos = task.position_order || 0;
    div.dataset.col = col;

    const date = new Date(task.created_at).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short' });

    let prioBadge = '';
    if (task.priority === 'high')   prioBadge = '<span class="priority-badge prio-high">🔴 Vysoká</span>';
    if (task.priority === 'medium') prioBadge = '<span class="priority-badge prio-medium">🟡 Střední</span>';
    if (task.priority === 'low')    prioBadge = '<span class="priority-badge prio-low">🔵 Nízká</span>';

    const prevCol = COLUMNS[COLUMNS.indexOf(col) - 1];
    const nextCol = COLUMNS[COLUMNS.indexOf(col) + 1];
    let moveBtns = '';
    if (prevCol) moveBtns += `<button class="move-btn" onclick="window.moveCard('${task.id}','${prevCol}')">← ${COL_LABELS[prevCol]}</button>`;
    if (nextCol) moveBtns += `<button class="move-btn" onclick="window.moveCard('${task.id}','${nextCol}')">→ ${COL_LABELS[nextCol]}</button>`;

    div.innerHTML = `
      <button class="card-delete" onclick="window.deleteCard('${task.id}')" title="Smazat">✕</button>
      <button class="btn-edit" onclick="openEditModal('${task.id}')" title="Upravit">✏️</button>
      ${prioBadge}
      <div class="card-title">${escHtml(task.title)}</div>
      ${task.description ? `<div class="card-desc">${escHtml(task.description)}</div>` : ''}
      <div class="card-footer">
        <div class="creator">
          ${getAvatar(task.creator)}
          <span class="creator-name">${escHtml(getCreatorName(task.creator))}</span>
        </div>
        <div class="card-right">
          <span class="card-date">${date}</span>
          <button class="btn-trumpet" onclick="sendCardTrumpet('${escAttr(task.title)}','${escAttr(task.creator || '')}')" title="Poslat upozornění">🎺</button>
        </div>
      </div>
      ${moveBtns ? `<div class="card-move-btns">${moveBtns}</div>` : ''}
    `;

    // Drag events
    div.draggable = true;
    div.addEventListener('dragstart', e => {
      if (!isAdmin) { e.preventDefault(); return; }
      draggedId = task.id;
      draggedCol = col;
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-top','drag-over-bottom'));
    });

    // Card-level dragover for reordering within same column
    div.addEventListener('dragover', e => {
      if (!isAdmin || !draggedId) return;
      e.preventDefault(); e.stopPropagation();
      const rect = div.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-top','drag-over-bottom'));
      if (e.clientY < mid) div.classList.add('drag-over-top');
      else div.classList.add('drag-over-bottom');
    });

    div.addEventListener('drop', e => {
      if (!isAdmin || !draggedId || draggedId === task.id) return;
      e.preventDefault(); e.stopPropagation();

      const rect = div.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const insertBefore = e.clientY < mid;

      div.classList.remove('drag-over-top','drag-over-bottom');

      if (draggedCol === col) {
        // Reorder within same column
        const container = document.getElementById('cards-' + col);
        const cards = Array.from(container.querySelectorAll('.card'));
        const positions = cards.map(c => parseFloat(c.dataset.pos) || 0);
        const targetIdx = cards.findIndex(c => c.dataset.id === task.id);

        let newPos;
        if (insertBefore) {
          const before = positions[targetIdx - 1];
          newPos = before !== undefined ? (before + positions[targetIdx]) / 2 : positions[targetIdx] - 500;
        } else {
          const after = positions[targetIdx + 1];
          newPos = after !== undefined ? (positions[targetIdx] + after) / 2 : positions[targetIdx] + 500;
        }
        if (window.reorderCard) window.reorderCard(draggedId, newPos);
      } else {
        // Move to different column
        if (window.moveCard) window.moveCard(draggedId, col);
      }
    });

    return div;
  }

  // ── DRAG na prázdnou plochu sloupce ──────────────────────────
  function onColDragOver(e, col) {
    if (!isAdmin) return;
    e.preventDefault();
  }
  function onColDrop(e, col) {
    if (!isAdmin || !draggedId) return;
    e.preventDefault();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-top','drag-over-bottom'));
    if (draggedCol !== col && window.moveCard) window.moveCard(draggedId, col);
  }
  function onDragLeave(e) {
    // handled per-card
  }
  window.onColDragOver = onColDragOver;
  window.onColDrop = onColDrop;
  window.onDragLeave = onDragLeave;

  // ── ADMIN ────────────────────────────────────────────────────
  function toggleAdmin() {
    if (isAdmin) { logoutAdmin(); return; }
    document.getElementById('login-modal').classList.add('visible');
    setTimeout(() => document.getElementById('admin-pass-input').focus(), 50);
  }
  window.toggleAdmin = toggleAdmin;

  function doLogin() {
    const pass = document.getElementById('admin-pass-input').value;
    if (pass === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('login-modal').classList.remove('visible');
      document.getElementById('admin-pass-input').value = '';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('board').classList.add('admin-mode');
      document.getElementById('admin-btn').classList.add('active');
      document.getElementById('admin-btn').textContent = '🔓 Odhlásit';
      document.getElementById('admin-badge').style.display = 'inline-block';
      document.getElementById('col-in-progress').classList.remove('col-locked');
      document.getElementById('col-done').classList.remove('col-locked');
      showToast('🔓 Přihlášen jako admin');
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('admin-pass-input').select();
    }
  }
  window.doLogin = doLogin;

  function logoutAdmin() {
    isAdmin = false;
    document.getElementById('board').classList.remove('admin-mode');
    document.getElementById('admin-btn').classList.remove('active');
    document.getElementById('admin-btn').textContent = '🔒 Admin';
    document.getElementById('admin-badge').style.display = 'none';
    document.getElementById('col-in-progress').classList.add('col-locked');
    document.getElementById('col-done').classList.add('col-locked');
    showToast('🔒 Odhlášen');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('visible');
    document.getElementById('admin-pass-input').value = '';
    document.getElementById('login-error').style.display = 'none';
  }
  window.closeModal = closeModal;

  document.getElementById('login-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('login-modal');
  });

  // ── FORMULÁŘE ────────────────────────────────────────────────
  const selectedPriority = {};

  function selectPrio(col, prio) {
    selectedPriority[col] = prio;
    const picker = document.getElementById('prio-' + col);
    picker.querySelectorAll('.prio-opt').forEach(btn => {
      btn.className = 'prio-opt';
      if (btn.dataset.prio === prio) btn.classList.add('selected-' + prio);
    });
  }
  window.selectPrio = selectPrio;

  function showForm(col) {
    document.querySelector(`#col-${col} .add-btn`).style.display = 'none';
    document.getElementById('form-' + col).classList.add('visible');
    if (!selectedPriority[col]) selectPrio(col, 'none');
    document.getElementById('title-' + col).focus();
  }
  function hideForm(col) {
    document.querySelector(`#col-${col} .add-btn`).style.display = '';
    document.getElementById('form-' + col).classList.remove('visible');
    document.getElementById('title-' + col).value = '';
    document.getElementById('desc-' + col).value = '';
    document.getElementById('creator-' + col).value = '';
    selectPrio(col, 'none');
  }
  function addCard(col) {
    const title = document.getElementById('title-' + col).value.trim();
    if (!title) { document.getElementById('title-' + col).focus(); return; }
    const desc = document.getElementById('desc-' + col).value.trim();
    const creator = document.getElementById('creator-' + col).value.trim();
    const prio = selectedPriority[col] || 'none';
    if (window.saveCard) window.saveCard(col, title, desc, prio, creator);
    hideForm(col);
  }
  window.showForm = showForm;
  window.hideForm = hideForm;
  window.addCard = addCard;

  document.querySelectorAll('.add-form input[id^="title"]').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addCard(input.id.replace('title-', ''));
    });
  });

  // ── EDIT MODAL ───────────────────────────────────────────────
  let editingId = null;
  let editPriority = 'none';

  function openEditModal(id) {
    const task = currentTasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('edit-title').value = task.title || '';
    document.getElementById('edit-desc').value = task.description || '';
    document.getElementById('edit-error').style.display = 'none';
    selectEditPrio(task.priority || 'none');
    document.getElementById('edit-modal').classList.add('visible');
    setTimeout(() => document.getElementById('edit-title').focus(), 50);
  }
  window.openEditModal = openEditModal;

  function selectEditPrio(prio) {
    editPriority = prio;
    document.querySelectorAll('#edit-prio-picker .prio-opt').forEach(btn => {
      btn.className = 'prio-opt';
      if (btn.dataset.prio === prio) btn.classList.add('selected-' + prio);
    });
  }
  window.selectEditPrio = selectEditPrio;

  function saveEdit() {
    const title = document.getElementById('edit-title').value.trim();
    if (!title) { document.getElementById('edit-error').style.display = 'block'; document.getElementById('edit-title').focus(); return; }
    const desc = document.getElementById('edit-desc').value.trim();
    document.getElementById('edit-error').style.display = 'none';
    if (window.updateCard) window.updateCard(editingId, title, desc, editPriority);
    closeModal('edit-modal');
    showToast('✅ Úkol upraven');
  }
  window.saveEdit = saveEdit;

  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('edit-modal');
  });
  document.getElementById('edit-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveEdit();
  });

  // ── UTILS ────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return String(str || '').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  // Fallback
  if (!window.saveCard)   { window.saveCard = () => {}; window.deleteCard = () => {}; window.moveCard = () => {}; window.reorderCard = () => {}; }
</script>
