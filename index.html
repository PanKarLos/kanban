<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanban Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; color: #f1f5f9; flex: 1; }

    #connection-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: #64748b;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .header-btn {
      background: #334155; border: none; color: #94a3b8;
      border-radius: 8px; padding: 7px 12px; cursor: pointer;
      font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .header-btn:hover { background: #475569; color: #e2e8f0; }
    .header-btn.active { background: #6366f1; color: #fff; }

    /* Admin badge */
    #admin-badge {
      display: none;
      background: #6366f1;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 340px;
      max-width: 90vw;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .modal p { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; line-height: 1.5; }

    .modal input {
      width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: #6366f1; }

    .modal-buttons { display: flex; gap: 8px; }

    .btn-primary {
      flex: 1; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #4f46e5; }

    .btn-secondary {
      background: #334155; color: #94a3b8; border: none;
      border-radius: 8px; padding: 10px 14px; font-size: 0.9rem;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: #475569; color: #e2e8f0; }

    .modal-error { color: #ef4444; font-size: 0.8rem; margin-bottom: 10px; display: none; }

    /* Board */
    .board {
      display: flex; gap: 20px;
      padding: 24px 28px;
      overflow-x: auto;
      min-height: calc(100vh - 65px);
      align-items: flex-start;
    }

    .column {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; width: 320px; min-width: 320px;
      display: flex; flex-direction: column;
      max-height: calc(100vh - 110px);
    }

    .column-header {
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #334155;
    }

    .column-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-new .column-dot { background: #6366f1; }
    .col-in-progress .column-dot { background: #f59e0b; }
    .col-done .column-dot { background: #22c55e; }

    .column-title { font-weight: 600; font-size: 0.92rem; color: #cbd5e1; flex: 1; }
    .column-count { background: #334155; color: #94a3b8; font-size: 0.73rem; font-weight: 600; border-radius: 20px; padding: 2px 8px; }

    /* Lock — ostatní sloupce jsou viditelné, jen bez add tlačítka */
    .col-locked .add-area { display: none; }

    .lock-notice { display: none; }

    .cards {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 60px;
    }
    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .card {
      background: #0f172a; border: 1px solid #334155;
      border-radius: 10px; padding: 13px;
      cursor: default; transition: all 0.15s ease; position: relative;
    }
    .admin-mode .card { cursor: grab; }
    .admin-mode .card:active { cursor: grabbing; }
    .card:hover { border-color: #4f46e5; box-shadow: 0 4px 18px rgba(99,102,241,0.12); }
    .card.dragging { opacity: 0.4; }

    .card-title { font-size: 0.88rem; font-weight: 600; color: #e2e8f0; margin-bottom: 5px; line-height: 1.4; padding-right: 26px; }
    .card-desc { font-size: 0.78rem; color: #64748b; line-height: 1.5; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }
    .card-date { font-size: 0.7rem; color: #475569; white-space: nowrap; }

    .card-actions { display: flex; gap: 5px; align-items: center; }

    /* Trumpet button - viditelný všem */
    .btn-trumpet {
      background: none; border: 1px solid #334155; color: #94a3b8;
      border-radius: 6px; padding: 3px 7px; cursor: pointer; font-size: 0.8rem;
      transition: all 0.15s; line-height: 1;
    }
    .btn-trumpet:hover { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }
    .btn-trumpet:active { transform: scale(0.92); }

    /* Admin-only buttons */
    .admin-only { display: none; }
    .admin-mode .admin-only { display: flex; }

    .move-btn {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      font-size: 0.7rem; border-radius: 6px; padding: 3px 7px; cursor: pointer; transition: all 0.15s;
    }
    .move-btn:hover { background: #334155; color: #e2e8f0; }

    .card-delete {
      background: none; border: none; color: #475569; cursor: pointer;
      padding: 3px 5px; border-radius: 4px; font-size: 0.82rem; line-height: 1;
      transition: color 0.15s; position: absolute; top: 9px; right: 9px;
      display: none;
    }
    .admin-mode .card-delete { display: block; }
    .card-delete:hover { color: #ef4444; }

    /* Add area */
    .add-area { padding: 10px; border-top: 1px solid #334155; }
    .add-btn {
      width: 100%; background: none; border: 1px dashed #334155; color: #64748b;
      padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.83rem;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .add-btn:hover { border-color: #6366f1; color: #a5b4fc; background: rgba(99,102,241,0.06); }

    .add-form { display: none; flex-direction: column; gap: 8px; }
    .add-form.visible { display: flex; }
    .add-form input, .add-form textarea {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 8px; padding: 9px 12px; font-size: 0.83rem; font-family: inherit;
      resize: none; outline: none; transition: border-color 0.15s;
    }
    .add-form input:focus, .add-form textarea:focus { border-color: #6366f1; }
    .add-form input::placeholder, .add-form textarea::placeholder { color: #475569; }
    .form-btns { display: flex; gap: 8px; }
    .btn-save {
      flex: 1; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; padding: 8px; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #4f46e5; }
    .btn-cancel {
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      border-radius: 8px; padding: 8px 10px; font-size: 0.83rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }

    .drop-zone-active { background: rgba(99,102,241,0.05); }

    /* Toast notification */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.85rem; color: #e2e8f0;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: #22c55e44; }
    #toast.error { border-color: #ef444444; }

    @media (max-width: 768px) {
      .board { padding: 14px; flex-direction: column; }
      .column { width: 100%; min-width: unset; max-height: none; }
    }
  </style>
</head>
<body>

<!-- ============================================================
  ⚙️  KONFIGURACE — vyplň níže
  ============================================================ -->
<script>
  const SUPABASE_URL = "%%SUPABASE_URL%%";
  const SUPABASE_KEY = "%%SUPABASE_KEY%%";
  const NTFY_TOPIC = "%%NTFY_TOPIC%%";
  const ADMIN_PASSWORD = "%%ADMIN_PASSWORD%%";
</script>

<!-- Admin login modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h2>🔒 Admin přihlášení</h2>
    <p>Zadej heslo pro správu úkolů — přesouvání, mazání a přidávání do všech sloupců.</p>
    <div class="modal-error" id="login-error">Špatné heslo, zkus to znovu.</div>
    <input type="password" id="admin-pass-input" placeholder="Heslo" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="modal-buttons">
      <button class="btn-primary" onclick="doLogin()">Přihlásit se</button>
      <button class="btn-secondary" onclick="closeModal('login-modal')">Zrušit</button>
    </div>
  </div>
</div>

<header>
  <h1>📋 Kanban Board</h1>
  <span id="admin-badge">ADMIN</span>
  <button class="header-btn" onclick="sendPingNotification()" title="Poslat upozornění">🎺 Ping</button>
  <button class="header-btn" id="admin-btn" onclick="toggleAdmin()">🔒 Admin</button>
  <div id="connection-status">
    <span class="status-dot connecting" id="status-dot"></span>
    <span id="status-text">Připojuji…</span>
  </div>
</header>

<div class="board" id="board">
  <!-- Nové -->
  <div class="column col-new" id="col-new"
    ondragover="onDragOver(event,'new')" ondrop="onDrop(event,'new')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Nové</span>
      <span class="column-count" id="count-new">0</span>
    </div>
    <div class="cards" id="cards-new"></div>
    <div class="add-area">
      <button class="add-btn" onclick="showForm('new')">＋ Přidat úkol</button>
      <div class="add-form" id="form-new">
        <input type="text" id="title-new" placeholder="Název úkolu" maxlength="120"/>
        <textarea id="desc-new" placeholder="Popis (volitelné)" rows="2"></textarea>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('new')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('new')">Zrušit</button>
        </div>
      </div>
    </div>
    <div class="lock-notice"></div>
  </div>

  <!-- Probíhá -->
  <div class="column col-in-progress col-locked" id="col-in-progress"
    ondragover="onDragOver(event,'in-progress')" ondrop="onDrop(event,'in-progress')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Probíhá</span>
      <span class="column-count" id="count-in-progress">0</span>
    </div>
    <div class="cards" id="cards-in-progress"></div>
    <div class="add-area">
      <button class="add-btn" onclick="showForm('in-progress')">＋ Přidat úkol</button>
      <div class="add-form" id="form-in-progress">
        <input type="text" id="title-in-progress" placeholder="Název úkolu" maxlength="120"/>
        <textarea id="desc-in-progress" placeholder="Popis (volitelné)" rows="2"></textarea>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('in-progress')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('in-progress')">Zrušit</button>
        </div>
      </div>
    </div>
    <div class="lock-notice">🔒 Pouze pro admina</div>
  </div>

  <!-- Hotovo -->
  <div class="column col-done col-locked" id="col-done"
    ondragover="onDragOver(event,'done')" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-dot"></div>
      <span class="column-title">Hotovo</span>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div class="cards" id="cards-done"></div>
    <div class="add-area">
      <button class="add-btn" onclick="showForm('done')">＋ Přidat úkol</button>
      <div class="add-form" id="form-done">
        <input type="text" id="title-done" placeholder="Název úkolu" maxlength="120"/>
        <textarea id="desc-done" placeholder="Popis (volitelné)" rows="2"></textarea>
        <div class="form-btns">
          <button class="btn-save" onclick="addCard('done')">Přidat</button>
          <button class="btn-cancel" onclick="hideForm('done')">Zrušit</button>
        </div>
      </div>
    </div>
    <div class="lock-notice">🔒 Pouze pro admina</div>
  </div>
</div>

<div id="toast"></div>

<!-- ============================================================
  SUPABASE INTEGRATION
  ============================================================ -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const isConfigured = !SUPABASE_URL.includes('TVŮJ');

  if (!isConfigured) {
    setStatus('offline', 'Není nakonfigurováno');
    showToast('⚠️ Vyplň SUPABASE_URL a SUPABASE_KEY v souboru', 'error');
  } else {
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadAll() {
      const { data, error } = await supabase
        .from('tasks')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) { setStatus('offline', 'Chyba připojení'); return; }
      setStatus('connected', 'Sdílený – live');
      renderAll(data || []);
    }

    supabase.channel('tasks-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadAll())
      .subscribe(s => { if (s === 'SUBSCRIBED') setStatus('connected', 'Sdílený – live'); });

    loadAll();

    window.saveCard = async function(col, title, desc) {
      const { error } = await supabase.from('tasks').insert([{ title, description: desc, status: col }]);
      if (!error) sendNewTaskNotification(title);
    };

    window.deleteCard = async function(id) {
      if (!confirm('Smazat úkol?')) return;
      await supabase.from('tasks').delete().eq('id', id);
    };

    window.moveCard = async function(id, newCol) {
      await supabase.from('tasks').update({ status: newCol }).eq('id', id);
    };
  }
</script>

<!-- ============================================================
  HLAVNÍ LOGIKA
  ============================================================ -->
<script>
  const COLUMNS = ['new', 'in-progress', 'done'];
  const COL_LABELS = { 'new': 'Nové', 'in-progress': 'Probíhá', 'done': 'Hotovo' };
  let draggedId = null;
  let isAdmin = false;

  // ── STATUS ──────────────────────────────────────────────────
  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'connecting' ? ' connecting' : '');
    document.getElementById('status-text').textContent = text;
  }

  // ── TOAST ────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3500);
  }

  // ── NOTIFIKACE (ntfy.sh) ─────────────────────────────────────
  async function sendNtfy(title, message, tags = '') {
    if (NTFY_TOPIC.includes('TVŮJ')) return;
    try {
      await fetch('https://ntfy.sh/' + NTFY_TOPIC, {
        method: 'POST',
        headers: {
          'Title': title,
          'Tags': tags,
          'Content-Type': 'text/plain; charset=utf-8'
        },
        body: message
      });
    } catch(e) { console.warn('ntfy error', e); }
  }

  function sendNewTaskNotification(taskTitle) {
    sendNtfy('📋 Nový úkol přidán', taskTitle, 'inbox_tray');
    showToast('✅ Úkol přidán');
  }

  function sendPingNotification() {
    sendNtfy('🎺 Ping z Kanban boardu', 'Někdo ti posílá upozornění!', 'loudspeaker,rotating_light');
    showToast('🎺 Ping odeslán!');
  }

  window.sendPingNotification = sendPingNotification;

  function sendCardTrumpet(taskTitle) {
    sendNtfy('🎺 Upozornění na úkol', taskTitle, 'loudspeaker');
    showToast('🎺 Upozornění odesláno!');
  }

  // ── ADMIN ────────────────────────────────────────────────────
  function toggleAdmin() {
    if (isAdmin) {
      logoutAdmin();
    } else {
      document.getElementById('login-modal').classList.add('visible');
      setTimeout(() => document.getElementById('admin-pass-input').focus(), 50);
    }
  }
  window.toggleAdmin = toggleAdmin;

  function doLogin() {
    const pass = document.getElementById('admin-pass-input').value;
    if (pass === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('login-modal').classList.remove('visible');
      document.getElementById('admin-pass-input').value = '';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('board').classList.add('admin-mode');
      document.getElementById('admin-btn').classList.add('active');
      document.getElementById('admin-btn').textContent = '🔓 Odhlásit';
      document.getElementById('admin-badge').style.display = 'inline-block';
      // Odemkni sloupce
      document.getElementById('col-in-progress').classList.remove('col-locked');
      document.getElementById('col-done').classList.remove('col-locked');
      showToast('🔓 Přihlášen jako admin');
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('admin-pass-input').select();
    }
  }
  window.doLogin = doLogin;

  function logoutAdmin() {
    isAdmin = false;
    document.getElementById('board').classList.remove('admin-mode');
    document.getElementById('admin-btn').classList.remove('active');
    document.getElementById('admin-btn').textContent = '🔒 Admin';
    document.getElementById('admin-badge').style.display = 'none';
    document.getElementById('col-in-progress').classList.add('col-locked');
    document.getElementById('col-done').classList.add('col-locked');
    showToast('🔒 Odhlášen z admin režimu');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('visible');
    document.getElementById('admin-pass-input').value = '';
    document.getElementById('login-error').style.display = 'none';
  }
  window.closeModal = closeModal;

  // ── RENDER ────────────────────────────────────────────────────
  function renderAll(tasks) {
    const buckets = { 'new': [], 'in-progress': [], 'done': [] };
    tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });
    COLUMNS.forEach(col => {
      const container = document.getElementById('cards-' + col);
      container.innerHTML = '';
      buckets[col].forEach(t => container.appendChild(buildCard(t)));
      document.getElementById('count-' + col).textContent = buckets[col].length;
    });
  }

  function buildCard(task) {
    const col = task.status;
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = task.id;

    const date = new Date(task.created_at).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short' });

    const prevCol = COLUMNS[COLUMNS.indexOf(col) - 1];
    const nextCol = COLUMNS[COLUMNS.indexOf(col) + 1];
    let moveBtns = '';
    if (prevCol) moveBtns += `<button class="move-btn" onclick="window.moveCard('${task.id}','${prevCol}')">← ${COL_LABELS[prevCol]}</button>`;
    if (nextCol) moveBtns += `<button class="move-btn" onclick="window.moveCard('${task.id}','${nextCol}')">→ ${COL_LABELS[nextCol]}</button>`;

    div.innerHTML = `
      <button class="card-delete admin-only" onclick="window.deleteCard('${task.id}')" title="Smazat">✕</button>
      <div class="card-title">${escHtml(task.title)}</div>
      ${task.description ? `<div class="card-desc">${escHtml(task.description)}</div>` : ''}
      <div class="card-footer">
        <span class="card-date">${date}</span>
        <div class="card-actions">
          <button class="btn-trumpet" onclick="sendCardTrumpet('${escAttr(task.title)}')" title="Poslat upozornění na tento úkol">🎺</button>
          ${moveBtns ? `<div class="admin-only" style="display:none;gap:5px">${moveBtns}</div>` : ''}
        </div>
      </div>
    `;

    // Drag (jen admin)
    div.addEventListener('dragstart', () => {
      if (!isAdmin) return;
      draggedId = task.id;
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); draggedId = null; });
    div.draggable = true;

    return div;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return String(str).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  // ── DRAG & DROP ───────────────────────────────────────────────
  function onDragOver(e, col) {
    if (!isAdmin) return;
    e.preventDefault();
    document.getElementById('col-' + col).classList.add('drop-zone-active');
  }
  function onDragLeave(e) {
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drop-zone-active'));
  }
  function onDrop(e, col) {
    e.preventDefault();
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drop-zone-active'));
    if (draggedId && isAdmin) window.moveCard(draggedId, col);
  }
  window.onDragOver = onDragOver;
  window.onDragLeave = onDragLeave;
  window.onDrop = onDrop;

  // ── FORMULÁŘE ─────────────────────────────────────────────────
  function showForm(col) {
    document.querySelector(`#col-${col} .add-btn`).style.display = 'none';
    document.getElementById('form-' + col).classList.add('visible');
    document.getElementById('title-' + col).focus();
  }
  function hideForm(col) {
    document.querySelector(`#col-${col} .add-btn`).style.display = '';
    document.getElementById('form-' + col).classList.remove('visible');
    document.getElementById('title-' + col).value = '';
    document.getElementById('desc-' + col).value = '';
  }
  function addCard(col) {
    const title = document.getElementById('title-' + col).value.trim();
    if (!title) { document.getElementById('title-' + col).focus(); return; }
    const desc = document.getElementById('desc-' + col).value.trim();
    if (window.saveCard) window.saveCard(col, title, desc);
    hideForm(col);
  }
  window.showForm = showForm;
  window.hideForm = hideForm;
  window.addCard = addCard;

  document.querySelectorAll('.add-form input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addCard(input.id.replace('title-', ''));
    });
  });

  // Close modal on overlay click
  document.getElementById('login-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('login-modal');
  });

  // Fallback pokud Supabase není načtený
  if (!window.saveCard) {
    window.saveCard = () => {};
    window.deleteCard = () => {};
    window.moveCard = () => {};
  }
</script>
</body>
</html>
